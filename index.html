<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>西西弗斯验证码</title>
    <style>
        :root {
            --blue-primary: #4A90E2;
            --bg-gray: #f9f9f9;
        }

        body {
            font-family: "Roboto", "Helvetica", "Arial", sans-serif;
            background-color: #e9e9e9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* 验证码外框 */
        .captcha-container {
            width: 350px;
            background: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            border: 1px solid #ccc;
            user-select: none;
            position: relative;
        }

        /* 蓝色头部 */
        .header {
            background-color: var(--blue-primary);
            color: white;
            padding: 24px;
        }

        .header .title-small { font-size: 14px; margin-bottom: 4px; opacity: 0.9; }
        .header .title-large { font-size: 24px; font-weight: bold; line-height: 1.2; }

        /* 游戏内容区 */
        .game-area {
            height: 300px; /* 保持高度 */
            background-image: url('Background.png'); /* 基于 image_0.png 的坡面 */
            background-size: cover;
            background-position: bottom left;
            position: relative;
            overflow: hidden;
        }

        /* 石头 */
        #stone {
            width: 50px; /* 尺寸参考 image_1.png */
            height: 50px;
            position: absolute;
            background-image: url('Stone.png'); /* image_1.png */
            background-size: contain;
            background-repeat: no-repeat;
            transform-origin: center center;
            bottom: 10px; /* 起始位置 */
            left: -60px; /* 起始位置在西西弗斯前面，屏幕外 */
        }

        /* 西西弗斯 */
        #sisyphus {
            width: 30px; /* 尺寸参考 image_2.png */
            height: 60px;
            position: absolute;
            background-image: url('Sisyphus.png'); /* image_2.png */
            background-size: contain;
            background-repeat: no-repeat;
            bottom: 10px; /* 起始位置 */
            left: 10px; /* 起始位置 */
        }

        /* 底部滑块容器 */
        .slider-container {
            height: 40px;
            background-color: #f0f0f0;
            border-top: 1px solid #eee;
            position: relative;
        }

        /* 滑块轨道 */
        .slider-track {
            position: absolute;
            top: 50%;
            left: 10px;
            right: 10px;
            height: 10px;
            background-color: #d0d0d0;
            transform: translateY(-50%);
            border-radius: 5px;
        }

        /* 滑块把手 */
        .slider-handle {
            width: 40px;
            height: 40px;
            background-color: var(--blue-primary);
            border-radius: 50%;
            position: absolute;
            top: 0;
            left: -20px; /* 初始位置 */
            cursor: grab;
            transition: transform 0.1s ease-out;
        }

        .slider-handle.dragging {
            cursor: grabbing;
            transform: scale(1.1);
        }

        /* 底部工具栏 */
        .footer {
            border-top: 1px solid #eee;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .icons { display: flex; gap: 15px; color: #777; font-size: 20px; }
        .icons span { cursor: pointer; }

        .verify-btn {
            background-color: var(--blue-primary);
            color: white;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 3px;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* 结算弹窗 */
        #status-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            color: white;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 100;
        }
    </style>
</head>
<body>

<div class="captcha-container">
    <div class="header">
        <div class="title-small">拖动滑块，推石上山</div>
        <div class="title-large">西西弗斯验证码</div>
        <div class="title-small" style="margin-top:10px;">日复一日，永无止境</div>
    </div>

    <div class="game-area">
        <div id="sisyphus"></div>
        <div id="stone"></div>
    </div>

    <div class="slider-container">
        <div class="slider-track"></div>
        <div class="slider-handle" id="slider-handle"></div>
    </div>

    <div class="footer">
        <div class="icons">
            <span onclick="initGame()">🔄</span>
            <!-- 修改点 1: 添加 id="music-toggle" 和 onclick 事件 -->
            <span id="music-toggle" onclick="toggleMusic()">🎧</span>
            <span>ⓘ</span>
        </div>
        <button class="verify-btn" onclick="verify()">验证</button>
    </div>
</div>

<audio id="bgm-audio" loop>
  <source src="./sisiphus.mp3" type="audio/mpeg">
  您的浏览器不支持音频元素。
</audio>

<div id="status-overlay">
    <h2 id="result-title">验证失败</h2>
    <p id="result-desc"></p>
    <button onclick="closeOverlay()" style="padding: 10px 20px; margin-top: 20px;">再次尝试</button>
</div>

<script>
    const captchaContainer = document.querySelector('.captcha-container');
    const gameArea = document.querySelector('.game-area');
    const stone = document.getElementById('stone');
    const sisyphus = document.getElementById('sisyphus');
    const sliderContainer = document.querySelector('.slider-container');
    const sliderHandle = document.getElementById('slider-handle');
    const overlay = document.getElementById('status-overlay');

    let isDragging = false;
    let startX = 0;
    let sliderValue = 0; // 0-100
    let rollbackTimer = null;
    const slopeAngleFactor = 0.5; // 控制向上移动的速度与水平移动的比率

    // 初始化游戏
    function initGame() {
        sliderValue = 0;
        isDragging = false;
        if (rollbackTimer) cancelAnimationFrame(rollbackTimer);
        updateSisyphusPosition();
        closeOverlay();
    }

    // 更新西西弗斯和石头的位置
    function updateSisyphusPosition() {
        const maxX = captchaContainer.offsetWidth - 40; // 滑块轨道长度
        const currentX = (sliderValue / 100) * maxX; // 滑块当前 X
        sliderHandle.style.left = currentX + 'px'; // 滑块定位

        const areaWidth = gameArea.offsetWidth;
        const areaHeight = gameArea.offsetHeight;

        // 根据 sliderValue 计算西西弗斯和石头在坡面上的位置
        const sisyphusBaseX = 10;
        const sisyphusBaseY = 10;
        const targetX = sisyphusBaseX + (sliderValue / 100) * (areaWidth - 50); // 西西弗斯的 x 位置
        const targetY = sisyphusBaseY + (sliderValue / 40) * (areaHeight - 50) * slopeAngleFactor; // 西西弗斯的 y 位置

        sisyphus.style.left = targetX + 'px';
        sisyphus.style.bottom = targetY + 'px';

        // 石头在西西弗斯后面
        const stoneX = targetX + 15; // 在西西弗斯右侧（西西弗斯推石）
        const stoneY = targetY + 40; // 在西西弗斯上方
        stone.style.left = stoneX + 'px';
        stone.style.bottom = stoneY + 'px';

        // 石头滚动
        const rotation = (sliderValue / 100) * 360 * 3; // 滚动圈数
        stone.style.transform = `rotate(${rotation}deg)`;
    }

    // 滑块拖拽逻辑
    sliderHandle.addEventListener('mousedown', handleDragStart);
    document.addEventListener('mousemove', handleDragOver);
    document.addEventListener('mouseup', handleDragEnd);

    sliderHandle.addEventListener('touchstart', handleDragStart);
    document.addEventListener('touchmove', handleDragOver);
    document.addEventListener('touchend', handleDragEnd);

    function handleDragStart(e) {
        isDragging = true;
        if (rollbackTimer) cancelAnimationFrame(rollbackTimer);
        startX = (e.type === 'touchstart' ? e.touches[0] : e).clientX;
        sliderHandle.classList.add('dragging');
    }

    function handleDragOver(e) {
        if (!isDragging) return;
        const maxX = captchaContainer.offsetWidth - 20; // 滑块轨道长度
        const currentX = (e.type === 'touchmove' ? e.touches[0] : e).clientX;
        const delta = currentX - startX;
        // 计算新的 sliderValue (0-100)
        let newSliderValue = sliderValue + (delta / maxX) * 100;
        newSliderValue = Math.min(100, Math.max(0, newSliderValue));

        sliderValue = newSliderValue;
        startX = currentX;
        updateSisyphusPosition(); // 统一更新
    }

    function handleDragEnd() {
        isDragging = false;
        sliderHandle.classList.remove('dragging');
        // 如果用户停止拖动，开始溜车
        rollback();
    }

    // 自动溜车和滚回逻辑
    function rollback() {
        if (rollbackTimer) cancelAnimationFrame(rollbackTimer);
        rollbackTimer = requestAnimationFrame(rollbackAnimate);
    }

    function rollbackAnimate() {
        if (isDragging) return; // 如果正在拖动，则停止溜车

        // 如果石头到达山顶，触发滚回机制
        if (sliderValue > 95 && !isDragging) {
            // 有 90% 的概率滚回去
            const rollbackSuccess = Math.random() < 0.9;
            if (rollbackSuccess) {
                // 快速滚回
                sliderValue -= 2; // 每帧 -2%，比常规溜车快
                if (sliderValue < 0) sliderValue = 0;
                updateSisyphusPosition();
                rollbackTimer = requestAnimationFrame(rollbackAnimate);
                return; // 跳过常规溜车
            } else {
                // 10% 概率停在山顶，不滚回
                // 停止计时器
                return;
            }
        } else if (sliderValue > 0) {
            // 常规溜车：每帧减少 sliderValue
            sliderValue -= 0.5; // 每帧 -0.5%
            if (sliderValue < 0) sliderValue = 0;
            updateSisyphusPosition();
            rollbackTimer = requestAnimationFrame(rollbackAnimate);
        }
    }

    // 验证逻辑
    function verify() {
        if (rollbackTimer) cancelAnimationFrame(rollbackTimer);
        if (sliderValue > 95 && !isDragging) {
            // 石头停在山顶，通过验证
            // 可以添加成功动画或跳转
            window.location.href = "https://www.bilibili.com/video/BV1GJ411x7h7";
        } else {
            // 判定为非西西弗斯（即失败）
            showResult("检测到非西西弗斯行为", "日复一日，永无止境。石头甚至没有推到山顶，或者它滚回去了。你甚至不是一个合格的西西弗斯，更别说是神话中的神人了。");
        }
    }

    function showResult(title, desc) {
        document.getElementById('result-title').innerText = title;
        document.getElementById('result-desc').innerText = desc;
        overlay.style.display = 'flex';
    }

    function closeOverlay() {
        overlay.style.display = 'none';
        initGame();
    }

    // --- 音乐控制模块开始 ---

const audio = document.getElementById('bgm-audio');
const musicToggle = document.getElementById('music-toggle');
let isMuted = false; // 默认状态：未静音

// 1. 尝试自动播放的函数
function tryPlayMusic() {
  // 设置音量（0.0 到 1.0）
  audio.volume = 0.5; 
  
  audio.play().then(() => {
    console.log("音乐自动播放成功");
    // 如果自动播放成功，图标保持原样（或者你可以加个类名表示正在播放）
  }).catch((error) => {
    console.log("自动播放被浏览器阻止，等待用户交互", error);
    // 如果被阻止，我们可以暂时把图标变暗，提示用户点击
    musicToggle.style.opacity = "0.5";
    musicToggle.title = "点击播放背景音乐";
  });
}

// 2. 切换静音/播放的函数
function toggleMusic() {
  if (audio.paused) {
    // 如果当前是暂停状态，尝试播放
    audio.play();
    isMuted = false;
    musicToggle.style.opacity = "1";
    musicToggle.title = "点击关闭音乐";
  } else {
    // 如果当前是播放状态，暂停它
    audio.pause();
    isMuted = true;
    musicToggle.style.opacity = "0.5"; // 视觉上变暗表示已关闭
    musicToggle.title = "点击开启音乐";
  }
}

// 3. 页面加载完成后尝试播放
window.addEventListener('load', () => {
  // 稍微延迟一点执行，确保DOM加载完毕
  setTimeout(tryPlayMusic, 100);
});

// --- 音乐控制模块结束 ---

    // 启动
    initGame();
</script>

</body>
</html>
